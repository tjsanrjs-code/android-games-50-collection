<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neo Breakout v2 - Chain Gravity (Grok 제작)</title>
<style>
body { margin:0; background:#0a0a1f; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial; overflow:hidden; }
canvas { background:#111133; border:5px solid #00ffcc; box-shadow:0 0 40px #00ffcc; }
#ui { position:absolute; top:20px; left:20px; color:#00ffcc; font-size:22px; text-shadow:0 0 15px #00ffcc; pointer-events:none; }
</style>
</head>
<body>
<div id="ui">점수: 0 | 볼: 3 | 콤보: 0</div>
<canvas id="game" width="800" height="600"></canvas>

<script>
// Neo Breakout v2 - Grok 제작 (체인 그래비티 + 중력 반전)
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let score = 0, lives = 3, combo = 0;
let paddle = {x: 340, y: 550, width: 120, height: 15};
let balls = [{x: 400, y: 400, radius: 9, dx: 4.5, dy: -5.5, gravity: 0.08}];
let bricks = [];
let particles = [];

const rows = 7, cols = 10;
const brickW = 68, brickH = 22;

for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    bricks.push({
      x: c * (brickW + 12) + 45,
      y: r * (brickH + 12) + 80,
      w: brickW,
      h: brickH,
      visible: true,
      hp: r < 3 ? 1 : 2,
      color: r < 3 ? '#ff0088' : '#00aaff'
    });
  }
}

function createParticle(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y,
      vx: Math.random()*8 - 4,
      vy: Math.random()*8 - 6,
      life: 35,
      color: '#ffcc00'
    });
  }
}

function loop() {
  ctx.fillStyle = 'rgba(10,10,31,0.85)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (keys['ArrowLeft'] || keys['a']) paddle.x -= 9;
  if (keys['ArrowRight'] || keys['d']) paddle.x += 9;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
  ctx.fillStyle = '#00ffcc';
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

  for (let i = balls.length - 1; i >= 0; i--) {
    let b = balls[i];
    b.x += b.dx;
    b.y += b.dy;
    b.dy += b.gravity;

    if (b.x - b.radius < 0 || b.x + b.radius > canvas.width) b.dx = -b.dx;
    if (b.y - b.radius < 0) b.dy = -b.dy;

    if (b.y + b.radius > paddle.y && b.y - b.radius < paddle.y + paddle.height && b.x > paddle.x && b.x < paddle.x + paddle.width) {
      b.dy = -abs(b.dy) - 1;
      b.dx = (b.x - (paddle.x + paddle.width/2)) * 0.18;
      combo++;
    }

    for (let j = bricks.length - 1; j >= 0; j--) {
      let brick = bricks[j];
      if (brick.visible && b.x > brick.x && b.x < brick.x + brick.w && b.y > brick.y && b.y < brick.y + brick.h) {
        brick.hp--;
        if (brick.hp <= 0) {
          brick.visible = false;
          score += 10 * (combo + 1);
          createParticle(brick.x + brick.w/2, brick.y + brick.h/2);
          if (Math.random() < 0.35) {
            for (let k = 0; k < bricks.length; k++) {
              if (bricks[k].visible && Math.random() < 0.4) {
                bricks[k].visible = false;
                score += 5;
                createParticle(bricks[k].x + bricks[k].w/2, bricks[k].y + bricks[k].h/2);
              }
            }
          }
        }
        b.dy = -b.dy;
        break;
      }
    }

    if (b.y > canvas.height) {
      balls.splice(i, 1);
      if (balls.length === 0 && lives > 0) {
        lives--;
        balls.push({x: 400, y: 400, radius: 9, dx: 4.5, dy: -5.5, gravity: 0.08});
      }
    }
  }

  for (let brick of bricks) {
    if (brick.visible) {
      ctx.fillStyle = brick.color;
      ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 35;
    ctx.fillRect(p.x, p.y, 6, 6);
    if (p.life <= 0) particles.splice(i, 1);
  }
  ctx.globalAlpha = 1;

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
